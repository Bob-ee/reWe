server {
  listen 80;
  server_name example.com; # CHANGE THIS to your domain

  # Redirect ACME/.well-known to certbot if needed (optional)
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Proxy app frontend (nginx in container mapped to host:8080)
  location / {
    proxy_pass http://127.0.0.1:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy API to the backend container on port 5000
  location /api/ {
    proxy_pass http://127.0.0.1:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Optional: serve static files for /.well-known if you run certbot on host
}

# Notes:
# - Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled.
# - Replace example.com with your domain, enable SSL, and reload nginx.