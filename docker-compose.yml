version: '3.8'

services:
  portfolio:
    build: .
    container_name: rental-portfolio
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - rewebsite_bridge

  api:
    build: ./server
    container_name: rental-portfolio-api
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      # Directing persistent data to your external drive
      - /media/backup/reWebsite/server/data:/app/data
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - rewebsite_bridge

networks:
  # Using the external network so NPM (nginxproxymanager-app-1) can see these containers
  rewebsite_bridge:
    external: true