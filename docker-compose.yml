version: '3.8'
services:
  portfolio:
    build: .
    container_name: rental-portfolio
    restart: unless-stopped
    ports:
      - "8080:80" # Maps port 8080 on your Pi to port 80 in the container
  api:
    build: ./server
    container_name: rental-portfolio-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./server/data:/app/data
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Detroit2026!}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}

